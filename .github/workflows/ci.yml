name: CI

# Run on every push (all branches, no filter) and allow manual runs.
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - name: Set up TinyTeX (for PDF rendering)
        uses: r-lib/actions/setup-tinytex@v2

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rmarkdown
            any::ggplot2
            any::dplyr
            any::psych

      # Real functional run: knits the report end to end, which fetches
      # the live dataset from lock5stat.com and re-fits every model in
      # the report (see README "Continuous Integration" for the external-
      # dependency caveat this implies). Output is written to a fresh,
      # git-ignored path so this step never modifies the committed .Rmd
      # or the committed Stat353Proj3v2.pdf.
      - name: Knit report to PDF
        run: |
          mkdir -p ci-output
          Rscript -e 'rmarkdown::render("notebooks/Stat353Proj3v2.Rmd", output_format = "pdf_document", output_dir = "ci-output")'

      - name: Upload rendered report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-report
          path: ci-output/*.pdf
          retention-days: 7
          if-no-files-found: ignore
